name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit tests (native target) ──────────────────────────────────────────────
  test-viking-context:
    name: "Tests: faas/viking-context"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/viking-context
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/viking-context

      - name: cargo test
        run: cargo test --lib

  test-skill-extractor:
    name: "Tests: faas/skill-extractor"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/skill-extractor
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/skill-extractor

      - name: cargo test
        run: cargo test --lib

  test-pulsar-cli:
    name: "Tests: pulsar-cli"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulsar-cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pulsar-cli

      - name: cargo test
        run: cargo test

  # ── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: "Clippy: faas/viking-context"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/viking-context
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/viking-context

      - name: clippy
        run: cargo clippy --lib -- -D warnings
