name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Unit tests (native target) ──────────────────────────────────────────────
  test-viking-context:
    name: "Tests: faas/viking-context"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/viking-context
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/viking-context

      - name: cargo test
        run: cargo test --lib

  test-skill-extractor:
    name: "Tests: faas/skill-extractor"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/skill-extractor
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/skill-extractor

      - name: cargo test
        run: cargo test --lib

  test-inference-gateway:
    name: "Tests: faas/inference-gateway"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/inference-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/inference-gateway

      - name: cargo test
        run: cargo test --lib

  test-orchestrator:
    name: "Tests: faas/orchestrator"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas/orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas/orchestrator

      - name: cargo test
        run: cargo test --lib

  test-pulsar-cli:
    name: "Tests: pulsar-cli"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulsar-cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pulsar-cli

      - name: cargo test
        run: cargo test

  # ── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: "Clippy: ${{ matrix.crate }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crate:
          - faas/viking-context
          - faas/inference-gateway
          - faas/skill-extractor
          - faas/orchestrator
    defaults:
      run:
        working-directory: ${{ matrix.crate }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: clippy
        run: cargo clippy --lib -- -D warnings
