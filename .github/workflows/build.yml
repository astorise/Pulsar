name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── WASM Components (cargo build → wasm32-wasip1) ──────────────────────────
  build-faas:
    name: "Build WASM: faas components"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache workspace targets and registries without restoring cargo shims.
          cache-on-failure: true
          cache-bin: false

      - name: Build FaaS crates
        run: cargo build --release --target wasm32-wasip1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-components
          path: |
            target/wasm32-wasip1/release/*.wasm
          if-no-files-found: warn

  # ── CLI (native binary) ─────────────────────────────────────────────────────
  build-cli:
    name: "Build CLI: pulsar-cli (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pulsar-cli
          - os: windows-latest
            artifact: pulsar-cli.exe
          - os: macos-latest
            artifact: pulsar-cli
    defaults:
      run:
        working-directory: pulsar-cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.85.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: pulsar-cli
          cache-bin: false

      - name: Build
        run: cargo build --release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-cli-${{ matrix.os }}
          path: target/release/${{ matrix.artifact }}

  build-vscode-extension:
    name: "Build VS Code web extension"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulsar-vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pulsar-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Package web extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsar-web-extension
          path: pulsar-vscode/pulsar-web-extension.vsix
